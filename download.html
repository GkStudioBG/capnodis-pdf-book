<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preparando tu descarga — Capnodis</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: #fbf7ed;
      font-family: Arial, sans-serif;
      color: #172116;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: calc(100% - 40px);
      text-align: center;
      box-shadow: 0 4px 24px rgba(30, 44, 24, .10);
    }
    .brand {
      display: inline-block;
      background: #1d3522;
      color: #cfb035;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: .08em;
      padding: 7px 16px;
      border-radius: 8px;
      margin-bottom: 32px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e8e0d0;
      border-top-color: #1d3522;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; font-weight: 800; margin: 0 0 12px; }
    p { font-size: 15px; line-height: 1.6; color: #636b5e; margin: 0; }
    .error { display: none; }
    .error .icon { font-size: 48px; margin-bottom: 16px; }
    .error a { color: #1d3522; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">CAPNODIS</div>

    <div id="loading">
      <div class="spinner"></div>
      <h1>Preparando tu descarga…</h1>
      <p>En unos segundos se abrirá el acceso a la guía y los bonus.</p>
    </div>

    <div id="error" class="error">
      <div class="icon">⚠️</div>
      <h1 id="error-title">Error</h1>
      <p id="error-msg">Enlace no válido.</p>
      <p style="margin-top:16px;"><a href="mailto:Infinitycreativeltd@gmail.com">Infinitycreativeltd@gmail.com</a></p>
    </div>
  </div>

  <script>
    const VERIFY_URL = 'https://je8fwbkk.eu-central.insforge.app/functions/verify-download'
    const token = new URLSearchParams(window.location.search).get('token')

    function showError(title, msg) {
      document.getElementById('loading').style.display = 'none'
      const err = document.getElementById('error')
      err.style.display = 'block'
      document.getElementById('error-title').textContent = title
      document.getElementById('error-msg').textContent = msg
    }

    if (!token) {
      showError('Enlace no válido', 'No se ha encontrado un token de descarga en el enlace.')
    } else {
      // Redirect — verify-download handles validation and redirects to Google Drive
      window.location.replace(`${VERIFY_URL}?token=${encodeURIComponent(token)}`)
    }
  </script>
</body>
</html>
