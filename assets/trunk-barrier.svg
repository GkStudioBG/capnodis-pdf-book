<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none">
  <rect width="320" height="240" fill="#fbf7ed"/>
  <!-- Ground -->
  <rect x="0" y="155" width="320" height="85" fill="#c9a66b" opacity="0.5"/>
  <path d="M0 155 L320 155" stroke="#8b6442" stroke-width="2"/>
  <!-- Tree trunk -->
  <rect x="148" y="60" width="24" height="100" fill="#9b7a52" rx="3"/>
  <!-- Trunk base / collar -->
  <rect x="142" y="155" width="36" height="12" fill="#7a5c3a" rx="3"/>
  <!-- Leaves -->
  <ellipse cx="142" cy="50" rx="20" ry="12" fill="#9ba848" transform="rotate(-30 142 50)"/>
  <ellipse cx="178" cy="45" rx="24" ry="14" fill="#8a9640" transform="rotate(20 178 45)"/>
  <ellipse cx="135" cy="70" rx="16" ry="9" fill="#c9a030" opacity="0.7" transform="rotate(-20 135 70)"/>
  <ellipse cx="185" cy="68" rx="18" ry="10" fill="#b89028" opacity="0.7" transform="rotate(25 185 68)"/>
  <!-- BARRIER: mesh around trunk base -->
  <rect x="118" y="152" width="84" height="48" rx="10" fill="none" stroke="#6f8d4d" stroke-width="3" stroke-dasharray="8 4"/>
  <line x1="118" y1="165" x2="202" y2="165" stroke="#6f8d4d" stroke-width="2"/>
  <line x1="118" y1="178" x2="202" y2="178" stroke="#6f8d4d" stroke-width="2"/>
  <line x1="118" y1="191" x2="202" y2="191" stroke="#6f8d4d" stroke-width="2"/>
  <!-- Barrier posts -->
  <rect x="118" y="152" width="6" height="48" fill="#6f8d4d" rx="2"/>
  <rect x="196" y="152" width="6" height="48" fill="#6f8d4d" rx="2"/>
  <!-- Ground level indicator -->
  <line x1="108" y1="155" x2="218" y2="155" stroke="#c98b37" stroke-width="2" stroke-dasharray="6 3"/>
  <!-- Labels -->
  <text x="160" y="215" text-anchor="middle" fill="#6f8d4d" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800" opacity="0.85">Barrera física</text>
  <rect x="120" y="185" width="80" height="16" rx="5" fill="#6f8d4d" opacity="0.85"/>
  <text x="160" y="197" text-anchor="middle" fill="white" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="900">Malla protectora</text>
</svg>