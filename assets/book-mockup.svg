<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 480" fill="none">
  <defs>
    <linearGradient id="cover-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#263f2b"/>
      <stop offset="100%" stop-color="#102116"/>
    </linearGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#c98b37"/>
      <stop offset="70%" stop-color="#f5d38d"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <!-- Cover -->
  <rect x="20" y="20" width="320" height="440" rx="12" fill="url(#cover-bg)"/>
  <rect x="20" y="20" width="320" height="440" rx="12" fill="none" stroke="#c98b37" stroke-width="1.5" opacity="0.4"/>
  <!-- Top band -->
  <rect x="20" y="20" width="320" height="60" rx="12" fill="#c98b37" opacity="0.15"/>
  <rect x="20" y="60" width="320" height="20" fill="#c98b37" opacity="0.15"/>
  <text x="180" y="58" text-anchor="middle" fill="#c98b37" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="900" letter-spacing="4">GUÍA PRÁCTICA</text>
  <!-- Gold accent line -->
  <rect x="40" y="95" width="280" height="2" fill="url(#gold-line)" opacity="0.8"/>
  <!-- Main title -->
  <text x="180" y="155" text-anchor="middle" fill="#f5d38d" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="900" letter-spacing="-1">Gusano Cabezudo</text>
  <text x="180" y="195" text-anchor="middle" fill="white" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="900" letter-spacing="-1">en Almendro</text>
  <!-- Divider -->
  <rect x="100" y="215" width="160" height="2" fill="#c98b37" opacity="0.6"/>
  <!-- Subtitle -->
  <text x="180" y="245" text-anchor="middle" fill="#f5d38d" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800">Diagnóstico y Manejo Integrado</text>
  <!-- Almond illustration (simple vector) -->
  <ellipse cx="180" cy="320" rx="50" ry="60" fill="none" stroke="#9b7a52" stroke-width="2" opacity="0.5"/>
  <ellipse cx="180" cy="320" rx="40" ry="50" fill="#c9a66b" opacity="0.3"/>
  <ellipse cx="180" cy="318" rx="35" ry="45" fill="none" stroke="#c98b37" stroke-width="1.5" opacity="0.6"/>
  <!-- Label badge -->
  <rect x="85" y="395" width="190" height="36" rx="999" fill="#c98b37" opacity="0.9"/>
  <text x="180" y="418" text-anchor="middle" fill="#102116" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="900">PDF · Accceso digital</text>
  <!-- Bottom info -->
  <text x="180" y="450" text-anchor="middle" fill="rgba(255,250,241,0.5)" font-family="Inter,Arial,sans-serif" font-size="10">+ 3 recursos imprimibles</text>
</svg>